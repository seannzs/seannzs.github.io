<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Lounge</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #0f172a, #020617);
    }

    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .neon {
      box-shadow: 0 0 10px #6366f1, 0 0 20px #6366f1;
    }

    .neon-green {
      box-shadow: 0 0 10px #22c55e, 0 0 20px #22c55e;
    }

    .fade-in {
      animation: fade 1s ease forwards;
      opacity: 0;
    }

    @keyframes fade {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(20px); }
    }
  </style>
</head>

<body class="text-white font-sans">

  <div class="min-h-screen flex items-center justify-center px-4">

    <!-- Card -->
    <div class="glass rounded-2xl p-6 w-full max-w-sm text-center fade-in">

      <!-- Logo -->
      <img src="logo.png" class="w-24 mx-auto mb-4">

      <!-- Title -->
      <h1 class="text-3xl font-bold mb-1">Echo Lounge</h1>
      <p class="text-gray-400 mb-6">Discord Community</p>

      <!-- Buttons -->
      <div class="space-y-3">

        <a href="https://discord.gg/LINK_KAMU"
          class="block py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 neon transition">
          🚀 Join Discord
        </a>

        <a href="https://tiktok.com/@username"
          class="block py-3 rounded-xl bg-pink-600 hover:bg-pink-700 neon transition">
          🎵 TikTok
        </a>

      </div>

      <!-- Kritik -->
      <div class="mt-6 text-left">
        <h2 class="mb-2 text-sm text-gray-300">Kritik & Saran</h2>

        <textarea id="pesan"
          class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none"
          placeholder="Tulis sesuatu..."></textarea>

        <button onclick="kirimPesan()"
          class="w-full mt-3 py-3 rounded-xl bg-green-600 hover:bg-green-700 neon-green transition">
          Kirim
        </button>
      </div>

    </div>

  </div>

  <script>
    async function kirimPesan() {
      const pesan = document.getElementById("pesan").value;

      if (!pesan) {
        alert("Isi dulu pesan nya!");
        return;
      }

      const webhookURL = "WEBHOOK_KAMU_DISINI";

      const data = {
        embeds: [
          {
            title: "📩 Kritik & Saran Baru",
            description: pesan,
            color: 5763719,
            footer: {
              text: "Echo Lounge"
            },
            timestamp: new Date()
          }
        ]
      };

      try {
        await fetch(webhookURL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        alert("Terkirim!");
        document.getElementById("pesan").value = "";

      } catch {
        alert("Gagal kirim!");
      }
    }
  </script>

</body>
</html>
