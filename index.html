<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <nav class="sidebar" id="sidebar">
        <div class="logo-area">
            <img src="https://i.imgur.com/7yUvePI.png" alt="Logo" class="main-logo">
            <h2>Echo Lounge</h2>
            <span>CONNECTED EXCELLENCE</span>
        </div>
        
        <ul class="nav-links">
            <li class="active" onclick="toggleSidebar()"><i class="fas fa-home"></i> Beranda</li>
            <li onclick="openModal('feedbackModal'); toggleSidebar()"><i class="fas fa-comment-dots"></i> Kritik & Saran</li>
            <li onclick="toggleSidebar()"><i class="fas fa-chart-line"></i> Statistik</li>
            <li onclick="document.getElementById('uploadInput').click(); toggleSidebar()"><i class="fas fa-upload"></i> Upload</li>
        </ul>

        <div class="sidebar-footer">
            <button class="btn-discord" onclick="window.open('https://discord.gg/jRkcCFdT4T')">
                <i class="fab fa-discord"></i> Join Discord
            </button>
        </div>
    </nav>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main class="main-content">
        <section class="hero">
            <div class="hero-content">
                <span class="tag">ECHO LOUNGE EXCLUSIVE</span>
                <h1>Connect, Create, & Collaborate.</h1>
                <p>Bagikan inspirasimu dan berkembang bersama komunitas kreatif kami.</p>
                <div class="action-btns">
                    <button class="btn-main" onclick="window.open('https://discord.gg/jRkcCFdT4T')">Join Server</button>
                    <button class="btn-sub" onclick="document.getElementById('uploadInput').click()">Upload Media</button>
                </div>
                <input type="file" id="uploadInput" hidden accept="image/*,video/*">
            </div>
        </section>

        <section class="gallery-section">
            <h3>GALERI MEMBER</h3>
            <div class="gallery-container" id="memberGallery">
                <div class="media-card"><img src="https://i.imgur.com/7yUvePI.png"></div>
                <div class="media-card"><img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400"></div>
                <div class="media-card"><img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=400"></div>
            </div>
        </section>
    </main>

    <div id="feedbackModal" class="modal-bg">
        <div class="modal-box">
            <span class="close-x" onclick="closeModal('feedbackModal')">&times;</span>
            <h3>Feedback</h3>
            <div class="type-select">
                <button onclick="setType('Kritik', this)" class="type-opt">Kritik</button>
                <button onclick="setType('Saran', this)" class="type-opt">Saran</button>
            </div>
            <textarea id="msgBody" placeholder="Tulis pesanmu di sini..."></textarea>
            <button id="submitFeedback" onclick="postToDiscord()" class="btn-send">Kirim Ke Discord</button>
        </div>
    </div>

    <div id="notif">Berhasil!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="javascript.js"></script>
</body>
        </html>
