<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Lounge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #020617, #0f172a);
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}

.btn {
  transition: 0.25s;
}
.btn:hover {
  transform: translateY(-2px);
}

.toast {
  animation: slideUp 0.4s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0;}
  to { transform: translateY(0); opacity: 1;}
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="glass rounded-2xl p-6 w-full max-w-sm text-center">

  <!-- Logo -->
  <img src="logo.png"
       onerror="this.src='https://cdn-icons-png.flaticon.com/512/5968/5968756.png'"
       class="w-20 mx-auto mb-4">

  <h1 class="text-2xl font-bold">Echo Lounge</h1>
  <p class="text-gray-400 mb-5 text-sm">Discord Community</p>

  <!-- Buttons -->
  <div class="space-y-3 mb-6">

    <a href="https://discord.gg/LINK_KAMU"
       class="btn block py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700">
       🚀 Join Discord
    </a>

    <a href="https://tiktok.com/@username"
       class="btn block py-3 rounded-xl bg-pink-600 hover:bg-pink-700">
       🎵 TikTok
    </a>

  </div>

  <!-- PILIH TIPE -->
  <div class="text-left mb-3">
    <p class="text-sm mb-2 text-gray-300">Pilih jenis</p>

    <div class="flex gap-2">
      <button onclick="setType('Kritik')" id="kritikBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">
        Kritik
      </button>

      <button onclick="setType('Saran')" id="saranBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800 hover:bg-gray-700">
        Saran
      </button>
    </div>
  </div>

  <!-- INPUT -->
  <textarea id="pesan"
    class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none"
    placeholder="Tulis pesan..."
    disabled></textarea>

  <!-- SEND -->
  <button onclick="kirimPesan()"
    class="w-full mt-3 py-3 rounded-xl bg-green-600 hover:bg-green-700 btn">
    Kirim
  </button>

</div>

<!-- TOAST -->
<div id="toast"
  class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-black px-4 py-2 rounded-lg text-sm border border-gray-700">
</div>

<script>
let selectedType = null;

function setType(type) {
  selectedType = type;
  document.getElementById("pesan").disabled = false;

  document.getElementById("kritikBtn").classList.remove("bg-indigo-600");
  document.getElementById("saranBtn").classList.remove("bg-indigo-600");

  if (type === "Kritik") {
    document.getElementById("kritikBtn").classList.add("bg-indigo-600");
  } else {
    document.getElementById("saranBtn").classList.add("bg-indigo-600");
  }
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.remove("hidden");

  setTimeout(() => {
    toast.classList.add("hidden");
  }, 2500);
}

async function kirimPesan() {
  const pesan = document.getElementById("pesan").value;

  if (!selectedType) {
    showToast("Pilih dulu Kritik atau Saran!");
    return;
  }

  if (!pesan) {
    showToast("Isi pesan dulu!");
    return;
  }

  const webhookURL = "WEBHOOK_KAMU";

  const data = {
    embeds: [{
      title: `📩 ${selectedType} Baru`,
      description: pesan,
      color: selectedType === "Kritik" ? 16711680 : 65280,
      footer: { text: "Echo Lounge" },
      timestamp: new Date()
    }]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    showToast("Berhasil dikirim!");
    document.getElementById("pesan").value = "";

  } catch {
    showToast("Gagal kirim!");
  }
}
</script>

</body>
</html>
