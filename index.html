<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Premium Connect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent: #6366f1;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --input-bg: rgba(0, 0, 0, 0.4);
        }

        .light-mode {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --accent: #4f46e5;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --input-bg: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background 0.5s ease;
            overflow: hidden;
        }

        /* Abstract Background Glow */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }

        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
        }

        .light-mode .glass-container {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
        }

        /* Input Fix: Teks harus Putih di Dark Mode */
        textarea {
            background: var(--input-bg) !important;
            color: var(--text-primary) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            transition: all 0.3s ease;
        }
        textarea:focus { border-color: var(--accent) !important; }

        .btn-premium {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-premium:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 30px -10px var(--accent);
        }
        .btn-premium:active { transform: scale(0.96); }

        /* Fancy Notification */
        #toast {
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #toast.active { bottom: 40px; }

    </style>
</head>
<body class="flex justify-center items-center min-h-screen px-6">

    <div class="glow" style="top: -10%; left: -10%;"></div>
    <div class="glow" style="bottom: -10%; right: -10%;"></div>

    <button onclick="toggleTheme()" class="fixed top-8 right-8 w-14 h-14 glass-container flex items-center justify-center z-50 hover:rotate-12 transition-transform">
        <i id="themeIcon" class="fas fa-moon text-indigo-400 text-xl"></i>
    </button>

    <div class="glass-container w-full max-w-[400px] p-10 text-center relative overflow-hidden" id="mainWrapper">
        
        <div id="headerSection">
            <div class="relative inline-block mb-8 group">
                <div class="absolute inset-0 bg-indigo-600 blur-3xl opacity-20 group-hover:opacity-40 transition-opacity"></div>
                <div class="w-28 h-28 bg-white p-2 rounded-[2.5rem] shadow-2xl relative border border-white/20">
                    <img src="https://i.imgur.com/7yUvePI.png" class="w-full h-full object-contain rounded-[2rem]" alt="Profile">
                </div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tighter mb-2">Echo Lounge</h1>
            <p class="text-sm font-semibold tracking-[0.2em] opacity-40 uppercase mb-10">Connected Excellence</p>
        </div>

        <div id="menuView" class="space-y-4">
            <a href="https://discord.gg/jRkcCFdT4T" target="_blank" 
               class="btn-premium flex items-center justify-between px-8 py-5 rounded-[2rem] bg-[#5865F2] text-white group">
                <div class="flex items-center gap-4">
                    <i class="fab fa-discord text-2xl"></i>
                    <span class="font-bold">Discord Community</span>
                </div>
                <i class="fas fa-arrow-right opacity-40 group-hover:translate-x-2 transition-transform"></i>
            </a>

            <a href="https://tiktok.com/@sean_logs" target="_blank"
               class="btn-premium flex items-center justify-between px-8 py-5 rounded-[2rem] bg-white/5 border border-white/10 group">
                <div class="flex items-center gap-4">
                    <i class="fab fa-tiktok text-2xl"></i>
                    <span class="font-bold">TikTok Feed</span>
                </div>
                <i class="fas fa-arrow-up-right-from-square opacity-40 group-hover:-translate-y-1 transition-transform"></i>
            </a>

            <button onclick="changePage('form')" 
                    class="btn-premium w-full py-5 rounded-[2rem] bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold mt-4 shadow-lg">
                <i class="fa-solid fa-bolt mr-2"></i> Kirim Masukan
            </button>
        </div>

        <div id="formView" class="hidden text-left">
            <button onclick="changePage('menu')" class="mb-8 flex items-center gap-2 font-bold text-xs opacity-40 hover:opacity-100 transition-all">
                <i class="fas fa-chevron-left"></i> KEMBALI
            </button>

            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="selectType('Kritik', this)" class="type-selector py-4 rounded-2xl bg-white/5 border border-white/5 font-bold text-[10px] tracking-widest uppercase hover:border-indigo-500 transition-all">🚨 Kritik</button>
                <button onclick="selectType('Saran', this)" class="type-selector py-4 rounded-2xl bg-white/5 border border-white/5 font-bold text-[10px] tracking-widest uppercase hover:border-indigo-500 transition-all">💡 Saran</button>
            </div>

            <textarea id="userInput" rows="5" class="w-full p-5 rounded-3xl outline-none text-sm leading-relaxed mb-6" placeholder="Tuliskan isi pikiranmu..."></textarea>

            <button id="submitBtn" onclick="handlePost()" class="w-full py-5 rounded-[2rem] bg-indigo-600 text-white font-extrabold shadow-2xl active:scale-95 transition-all">
                KIRIM FEEDBACK
            </button>
        </div>
    </div>

    <div id="toast" class="fixed px-8 py-5 rounded-[2rem] bg-slate-900 border border-white/10 shadow-2xl flex items-center gap-4 z-[100] min-w-[280px]">
        <div id="toastStatus" class="w-10 h-10 rounded-full flex items-center justify-center"></div>
        <div>
            <h4 id="toastTitle" class="text-white font-bold text-sm">System</h4>
            <p id="toastMsg" class="text-white/60 text-xs"></p>
        </div>
    </div>

    <script>
        let currentType = "";
        const webhook = "https://discord.com/api/webhooks/1501586415941582918/ALwCGRA0veR8KS-Lrix7Gdeky7gPagBN_ViHmU-R4O0HKFLPUIT5jbGir0SEm9N1tm8j";

        // Initial GSAP Animation
        window.addEventListener('DOMContentLoaded', () => {
            gsap.from("#mainWrapper", { duration: 1.5, y: 100, opacity: 0, ease: "expo.out" });
            gsap.from("#headerSection > *", { duration: 1, y: 30, opacity: 0, stagger: 0.2, ease: "power4.out", delay: 0.5 });
            gsap.from(".btn-premium", { duration: 1, x: -50, opacity: 0, stagger: 0.15, ease: "power4.out", delay: 0.8 });
        });

        function toggleTheme() {
            document.body.classList.toggle("light-mode");
            const icon = document.getElementById("themeIcon");
            if(document.body.classList.contains("light-mode")) {
                icon.className = "fas fa-sun text-orange-500 text-xl";
            } else {
                icon.className = "fas fa-moon text-indigo-400 text-xl";
            }
        }

        function changePage(page) {
            const menu = document.getElementById("menuView");
            const form = document.getElementById("formView");

            if(page === 'form') {
                gsap.to(menu, { duration: 0.4, x: -100, opacity: 0, onComplete: () => {
                    menu.classList.add("hidden");
                    form.classList.remove("hidden");
                    gsap.fromTo(form, { x: 100, opacity: 0 }, { duration: 0.6, x: 0, opacity: 1, ease: "expo.out" });
                }});
            } else {
                gsap.to(form, { duration: 0.4, x: 100, opacity: 0, onComplete: () => {
                    form.classList.add("hidden");
                    menu.classList.remove("hidden");
                    gsap.fromTo(menu, { x: -100, opacity: 0 }, { duration: 0.6, x: 0, opacity: 1, ease: "expo.out" });
                }});
            }
        }

        function selectType(val, el) {
            currentType = val;
            document.querySelectorAll('.type-selector').forEach(b => b.classList.remove('bg-indigo-600', 'border-indigo-400', 'text-white'));
            el.classList.add('bg-indigo-600', 'border-indigo-400', 'text-white');
            gsap.from(el, { scale: 0.9, duration: 0.3 });
        }

        function triggerToast(title, msg, error = false) {
            const t = document.getElementById("toast");
            const s = document.getElementById("toastStatus");
            document.getElementById("toastTitle").innerText = title;
            document.getElementById("toastMsg").innerText = msg;

            s.className = error ? "w-10 h-10 rounded-full bg-red-500/20 text-red-500 flex items-center justify-center" : "w-10 h-10 rounded-full bg-green-500/20 text-green-500 flex items-center justify-center";
            s.innerHTML = error ? '<i class="fas fa-times"></i>' : '<i class="fas fa-check"></i>';

            t.classList.add("active");
            setTimeout(() => t.classList.remove("active"), 4000);
        }

        async function handlePost() {
            const text = document.getElementById("userInput").value;
            const btn = document.getElementById("submitBtn");

            if(!currentType) return triggerToast("Gagal", "Pilih jenis masukan dulu!", true);
            if(!text.trim()) return triggerToast("Gagal", "Pesan tidak boleh kosong!", true);

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> MENGIRIM...';

            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        embeds: [{
                            title: `✨ Masukan Baru: ${currentType}`,
                            description: text,
                            color: currentType === "Kritik" ? 15548997 : 5763719,
                            footer: { text: "Echo Lounge Analytics" },
                            timestamp: new Date()
                        }]
                    })
                });
                triggerToast("Berhasil!", "Pesanmu sudah mendarat di Discord.");
                document.getElementById("userInput").value = "";
                setTimeout(() => changePage('menu'), 2000);
            } catch {
                triggerToast("Error", "Gagal menghubungi server.", true);
            }
            btn.disabled = false;
            btn.innerText = "KIRIM FEEDBACK";
        }
    </script>
</body>
    </html>
