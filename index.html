<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Premium Connect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --accent: #6366f1;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --border: rgba(255, 255, 255, 0.08);
        }

        .light-mode {
            --bg: #f1f5f9;
            --card: rgba(255, 255, 255, 0.8);
            --border: rgba(0, 0, 0, 0.05);
            --accent: #4f46e5;
        }

        body {
            background-color: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Border Cahaya Berputar */
        .card-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 34px;
            overflow: hidden;
            background: linear-gradient(var(--border), var(--border));
        }

        .card-wrapper::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, var(--accent), transparent, var(--accent), transparent);
            animation: rotate 6s linear infinite;
            top: -25%; left: -25%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            position: relative;
            z-index: 1;
        }

        /* Tombol Modern */
        .btn-modern {
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .btn-modern::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.1);
            width: 100px; height: 100%;
            left: -150px; top: 0;
            transform: skewX(-20deg);
            transition: 0.6s;
        }

        .btn-modern:hover::after { left: 120%; }

        /* Custom Notification */
        .notif {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .notif.active { top: 30px; }

    </style>
</head>
<body class="flex justify-center items-center min-h-screen px-6">

    <div id="customNotif" class="notif flex items-center gap-4 px-6 py-4 rounded-2xl shadow-2xl border border-white/10 bg-slate-900/90 backdrop-blur-xl text-white">
        <div id="notifIcon" class="w-10 h-10 rounded-full flex items-center justify-center bg-indigo-500 shadow-lg shadow-indigo-500/40">
            <i class="fas fa-check"></i>
        </div>
        <div>
            <p id="notifTitle" class="font-bold text-sm uppercase tracking-tighter">System</p>
            <p id="notifMsg" class="text-xs opacity-70">Pesan berhasil diproses.</p>
        </div>
    </div>

    <div class="fixed top-8 right-8 flex gap-4 z-50">
        <button onclick="toggleTheme()" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
            <i id="tIcon" class="fas fa-moon text-indigo-400"></i>
        </button>
    </div>

    <div class="card-wrapper shadow-[0_0_50px_-12px_rgba(99,102,241,0.3)]">
        <div class="card w-full max-w-[400px] p-10 text-center overflow-hidden">
            
            <div id="headerArea">
                <div class="relative inline-block mb-6 group">
                    <div class="absolute inset-0 bg-indigo-500 blur-3xl opacity-20 group-hover:opacity-40 transition-opacity duration-500"></div>
                    <img src="https://i.imgur.com/7yUvePI.png" 
                         class="w-24 h-24 mx-auto rounded-[2.5rem] relative border border-white/20 shadow-2xl bg-white p-2"
                         alt="Logo">
                </div>
                <h1 class="text-3xl font-bold tracking-tighter mb-1">Echo Lounge</h1>
                <div class="h-1 w-12 bg-indigo-500 mx-auto rounded-full mb-8"></div>
            </div>

            <div id="menuContent" class="space-y-4">
                <a href="https://discord.gg/jRkcCFdT4T" target="_blank"
                   class="btn-modern menu-item flex items-center justify-between px-6 py-5 rounded-2xl bg-[#5865F2] hover:shadow-[0_10px_30px_-10px_rgba(88,101,242,0.6)] group">
                    <div class="flex items-center gap-4">
                        <i class="fab fa-discord text-2xl"></i>
                        <span class="font-bold">Discord Server</span>
                    </div>
                    <i class="fas fa-chevron-right text-xs opacity-50 group-hover:translate-x-1 transition-transform"></i>
                </a>

                <a href="https://tiktok.com/@sean_logs" target="_blank"
                   class="btn-modern menu-item flex items-center justify-between px-6 py-5 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 group">
                    <div class="flex items-center gap-4">
                        <i class="fab fa-tiktok text-xl"></i>
                        <span class="font-bold">TikTok Feed</span>
                    </div>
                    <i class="fas fa-external-link-alt text-xs opacity-50"></i>
                </a>

                <button onclick="changeSection('form')"
                        class="btn-modern menu-item w-full flex items-center gap-4 px-6 py-5 rounded-2xl bg-gradient-to-r from-indigo-600/20 to-transparent border border-indigo-500/30 hover:border-indigo-500 transition-all">
                    <i class="fa-solid fa-comment-alt text-indigo-400"></i>
                    <span class="font-bold text-indigo-400">Kritik & Saran</span>
                </button>
            </div>

            <div id="formContent" class="hidden text-left">
                <button onclick="changeSection('menu')" class="mb-6 flex items-center gap-2 text-xs font-bold opacity-50 hover:opacity-100 transition-opacity uppercase tracking-widest">
                    <i class="fas fa-arrow-left"></i> Kembali
                </button>
                
                <div class="flex gap-2 mb-4">
                    <button onclick="pickType('Kritik', this)" class="type-btn flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-indigo-500 transition-all">🚨 Kritik</button>
                    <button onclick="pickType('Saran', this)" class="type-btn flex-1 py-3 rounded-xl bg-white/5 border border-white/10 text-[10px] font-bold uppercase tracking-widest hover:border-indigo-500 transition-all">💡 Saran</button>
                </div>

                <textarea id="msg" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:border-indigo-500 outline-none transition-all mb-4" rows="4" placeholder="Apa yang ingin Anda sampaikan?"></textarea>

                <button id="submit" onclick="sendToDiscord()" class="w-full py-5 rounded-2xl bg-indigo-600 font-bold shadow-xl hover:shadow-indigo-500/20 active:scale-95 transition-all uppercase tracking-widest text-xs">
                    Kirim Feedback
                </button>
            </div>

        </div>
    </div>

    <script>
        let selectedType = "";
        const webhook = "https://discord.com/api/webhooks/1501586415941582918/ALwCGRA0veR8KS-Lrix7Gdeky7gPagBN_ViHmU-R4O0HKFLPUIT5jbGir0SEm9N1tm8j";

        // GSAP Intro
        window.onload = () => {
            const tl = gsap.timeline();
            tl.from(".card-wrapper", { duration: 1, scale: 0.8, opacity: 0, ease: "back.out(1.7)" })
              .from("#headerArea", { y: -20, opacity: 0, duration: 0.5 })
              .from(".menu-item", { x: -30, opacity: 0, stagger: 0.1, duration: 0.4, ease: "power2.out" });
        };

        function toggleTheme() {
            const b = document.body;
            const i = document.getElementById("tIcon");
            b.classList.toggle("light-mode");
            i.classList.toggle("fa-moon");
            i.classList.toggle("fa-sun");
            gsap.from(b, { backgroundColor: b.classList.contains("light-mode") ? "#020617" : "#f1f5f9", duration: 1 });
        }

        function changeSection(to) {
            const menu = document.getElementById("menuContent");
            const form = document.getElementById("formContent");

            if(to === 'form') {
                gsap.to(menu, { opacity: 0, x: -50, duration: 0.3, onComplete: () => {
                    menu.classList.add("hidden");
                    form.classList.remove("hidden");
                    gsap.fromTo(form, { opacity: 0, x: 50 }, { opacity: 1, x: 0, duration: 0.5 });
                }});
            } else {
                gsap.to(form, { opacity: 0, x: 50, duration: 0.3, onComplete: () => {
                    form.classList.add("hidden");
                    menu.classList.remove("hidden");
                    gsap.fromTo(menu, { opacity: 0, x: -50 }, { opacity: 1, x: 0, duration: 0.5 });
                }});
            }
        }

        function pickType(t, btn) {
            selectedType = t;
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.remove('bg-indigo-600', 'border-indigo-400', 'shadow-lg');
                b.classList.add('bg-white/5');
            });
            btn.classList.add('bg-indigo-600', 'border-indigo-400', 'shadow-lg');
            gsap.from(btn, { scale: 0.9, duration: 0.2 });
        }

        function showNotif(title, msg, type = "success") {
            const n = document.getElementById("customNotif");
            const icon = document.getElementById("notifIcon");
            document.getElementById("notifTitle").innerText = title;
            document.getElementById("notifMsg").innerText = msg;

            if(type === "error") {
                icon.className = "w-10 h-10 rounded-full flex items-center justify-center bg-red-500 shadow-lg shadow-red-500/40";
                icon.innerHTML = '<i class="fas fa-times"></i>';
            } else {
                icon.className = "w-10 h-10 rounded-full flex items-center justify-center bg-indigo-500 shadow-lg shadow-indigo-500/40";
                icon.innerHTML = '<i class="fas fa-check"></i>';
            }

            n.classList.add("active");
            setTimeout(() => n.classList.remove("active"), 4000);
        }

        async function sendToDiscord() {
            const msgInput = document.getElementById("msg");
            const submitBtn = document.getElementById("submit");

            if(!selectedType) return showNotif("Warning", "Pilih kategori dulu, Sean!", "error");
            if(!msgInput.value.trim()) return showNotif("Warning", "Pesan jangan kosong!", "error");

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i>';

            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        embeds: [{
                            title: `📩 NEW FEEDBACK: ${selectedType}`,
                            description: `**Pesan dari User:**\n${msgInput.value}`,
                            color: selectedType === "Kritik" ? 15548997 : 5763719,
                            footer: { text: "Echo Lounge Analytics" },
                            timestamp: new Date()
                        }]
                    })
                });
                
                showNotif("Berhasil!", "Feedback terkirim ke server.");
                msgInput.value = "";
                setTimeout(() => changeSection('menu'), 2000);
            } catch {
                showNotif("Gagal!", "Coba cek koneksi Anda.", "error");
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = "Kirim Feedback";
        }
    </script>
</body>
                </html>
