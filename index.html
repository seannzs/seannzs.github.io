<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sean | Profile</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #020617;
    overflow-x: hidden;
}

/* Animated Gradient BG */
.bg-anim {
    position: fixed;
    inset: 0;
    background: linear-gradient(270deg, #3b82f6, #9333ea, #0ea5e9);
    background-size: 600% 600%;
    animation: gradientMove 15s ease infinite;
    opacity: 0.15;
    z-index: -1;
}

@keyframes gradientMove {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* Glass */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
}

/* Link Card */
.link-card {
    transition: all 0.25s ease;
}
.link-card:hover {
    transform: translateY(-5px) scale(1.02);
    box-shadow: 0 10px 40px rgba(59,130,246,0.25);
    border: 1px solid rgba(59,130,246,0.3);
}

/* Avatar Glow */
.avatar {
    position: relative;
}
.avatar::before {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 30px;
    background: linear-gradient(135deg,#3b82f6,#9333ea);
    filter: blur(25px);
    opacity: 0.6;
    z-index: -1;
}

/* Button press */
.btn:active {
    transform: scale(0.95);
}

/* Reveal */
.reveal {
    opacity: 0;
    transform: translateY(20px);
}
</style>
</head>

<body>

<div class="bg-anim"></div>

<main class="min-h-screen flex items-center justify-center px-4">
<div class="w-full max-w-md space-y-8 text-center">

    <!-- Avatar -->
    <div class="flex justify-center reveal">
        <div class="avatar w-28 h-28 rounded-[30px] overflow-hidden">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sean">
        </div>
    </div>

    <!-- Name -->
    <div class="reveal">
        <h1 class="text-4xl font-extrabold text-white">SEAN</h1>
        <p class="text-slate-400 text-sm">Seannz • Digital Creator</p>
    </div>

    <!-- Links -->
    <div class="space-y-3">

        <a href="#" onclick="checkLink(event,this)" 
        class="link-card glass p-4 rounded-2xl flex justify-between items-center reveal">
            <span class="font-semibold">WhatsApp</span>
            <i data-lucide="arrow-right"></i>
        </a>

        <a href="#" onclick="checkLink(event,this)" 
        class="link-card glass p-4 rounded-2xl flex justify-between items-center reveal">
            <span class="font-semibold">Instagram</span>
            <i data-lucide="lock"></i>
        </a>

        <a href="https://discord.gg/jRkcCFdT4T"
        class="link-card glass p-4 rounded-2xl flex justify-between items-center reveal">
            <span class="font-semibold">Discord Server</span>
            <i data-lucide="external-link"></i>
        </a>

    </div>

    <!-- Contact -->
    <form id="contactForm" class="space-y-3 reveal">
        <input id="name" placeholder="Nama..."
        class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none">

        <textarea id="message" placeholder="Pesan..."
        class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none"></textarea>

        <button class="btn w-full py-3 rounded-xl bg-blue-600 text-white font-bold flex justify-center gap-2">
            Kirim <i data-lucide="send"></i>
        </button>
    </form>

</div>
</main>

<script>
lucide.createIcons();

// reveal animation
gsap.to(".reveal", {
    opacity:1,
    y:0,
    duration:0.8,
    stagger:0.1
});

// link check
function checkLink(e, el){
    if(el.getAttribute("href") === "#"){
        e.preventDefault();
        alert("Link belum di set");
    }
}

// webhook (optional)
const WEBHOOK = "ISI_WEBHOOK";

document.getElementById("contactForm").onsubmit = async(e)=>{
    e.preventDefault();

    const name = document.getElementById("name").value;
    const msg = document.getElementById("message").value;

    if(!name || !msg){
        return alert("Isi dulu");
    }

    await fetch(WEBHOOK,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            content:`${name}: ${msg}`
        })
    });

    alert("Terkirim!");
};
</script>

</body>
    </html>
