<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Lounge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  overflow: hidden;
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* BUTTON */
.btn {
  transition: all 0.25s ease;
}
.btn:hover {
  transform: translateY(-2px);
  filter: brightness(1.1);
}
.btn:active {
  transform: scale(0.97);
}

/* FADE */
.fade {
  animation: fade 0.4s ease;
}
@keyframes fade {
  from {opacity:0; transform: translateY(15px);}
  to {opacity:1; transform: translateY(0);}
}

/* TOAST */
.toast-show {
  animation: toastIn 0.4s ease forwards;
}
.toast-hide {
  animation: toastOut 0.3s ease forwards;
}

@keyframes toastIn {
  from {opacity:0; transform: translateY(30px) scale(0.9);}
  to {opacity:1; transform: translateY(0) scale(1);}
}

@keyframes toastOut {
  to {opacity:0; transform: translateY(20px) scale(0.9);}
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="glass rounded-2xl p-6 w-full max-w-sm text-center fade">

  <!-- LOGO FIX -->
  <img src="logo.png"
       onerror="this.src='https://i.imgur.com/7yUvePI.png'"
       class="w-20 mx-auto mb-4 rounded-lg shadow-lg">

  <h1 class="text-2xl font-semibold">Echo Lounge</h1>
  <p class="text-gray-400 text-sm mb-6">Discord Community</p>

  <!-- MENU -->
  <div id="menu" class="space-y-3 fade">

    <a href="https://discord.gg/LINK_KAMU"
       class="btn flex items-center justify-center gap-2 py-3 rounded-xl bg-[#5865F2]">
       
      <!-- ICON DISCORD -->
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="w-5">
      Join Discord
    </a>

    <a href="https://tiktok.com/@username"
       class="btn flex items-center justify-center gap-2 py-3 rounded-xl bg-black border border-gray-700">
       
      <!-- ICON TIKTOK -->
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" class="w-5">
      TikTok
    </a>

    <button onclick="openForm()"
      class="btn w-full py-3 rounded-xl bg-gray-800 hover:bg-gray-700">
      💬 Kritik & Saran
    </button>

  </div>

  <!-- FORM -->
  <div id="form" class="hidden fade">

    <button onclick="backMenu()" class="text-sm text-gray-400 mb-3">
      ← Kembali
    </button>

    <div class="flex gap-2 mb-3">
      <button onclick="setType('Kritik')" id="kritikBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Kritik</button>

      <button onclick="setType('Saran')" id="saranBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Saran</button>
    </div>

    <textarea id="pesan"
      class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none"
      placeholder="Tulis pesan..."></textarea>

    <button onclick="kirimPesan()"
      class="btn w-full mt-3 py-3 rounded-xl bg-green-600">
      Kirim
    </button>

  </div>

</div>

<!-- TOAST -->
<div id="toast"
  class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg text-sm glass">
</div>

<script>
let selectedType = null;

function openForm() {
  menu.classList.add("hidden");
  form.classList.remove("hidden");
}

function backMenu() {
  form.classList.add("hidden");
  menu.classList.remove("hidden");
}

function setType(type) {
  selectedType = type;

  kritikBtn.classList.remove("bg-indigo-600");
  saranBtn.classList.remove("bg-indigo-600");

  if (type === "Kritik") kritikBtn.classList.add("bg-indigo-600");
  else saranBtn.classList.add("bg-indigo-600");
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("hidden", "toast-hide");
  t.classList.add("toast-show");

  setTimeout(() => {
    t.classList.remove("toast-show");
    t.classList.add("toast-hide");

    setTimeout(() => t.classList.add("hidden"), 300);
  }, 2200);
}

async function kirimPesan() {
  const pesan = document.getElementById("pesan").value;

  if (!selectedType) return showToast("Pilih dulu!");
  if (!pesan) return showToast("Isi pesan dulu!");

  const webhookURL = "WEBHOOK_KAMU";

  const data = {
    embeds: [{
      title: `📩 ${selectedType}`,
      description: pesan,
      color: selectedType === "Kritik" ? 16711680 : 65280
    }]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(data)
    });

    showToast("Berhasil dikirim 🚀");
    pesan.value = "";

  } catch {
    showToast("Gagal kirim ❌");
  }
}
</script>

</body>
  </html>
