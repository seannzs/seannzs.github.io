<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Lounge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin:0;
  background: #020617;
  overflow:hidden;
  font-family:sans-serif;
}

/* PARTICLE CANVAS */
#bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CARD */
.card {
  position:relative;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  border:1px solid rgba(255,255,255,0.08);
  padding:28px;
  width:100%;
  max-width:360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  overflow:hidden;
}

/* LIGHT EFFECT */
.card::before {
  content:'';
  position:absolute;
  inset:0;
  background: radial-gradient(circle at var(--x) var(--y),
    rgba(99,102,241,0.25), transparent 40%);
  opacity:0;
  transition:0.3s;
}
.card:hover::before {
  opacity:1;
}

/* BUTTON */
.btn {
  transition:0.25s;
}
.btn:hover {
  transform: translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}
.btn:active {
  transform:scale(0.96);
}

/* TOAST */
.toast {
  backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
  animation:fadeIn 0.4s;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(30px);}
  to {opacity:1; transform:translateY(0);}
}

.progress {
  height:3px;
  background:linear-gradient(to right,#22c55e,#4ade80);
  animation:load 2.5s linear forwards;
}
@keyframes load {
  from {width:100%;}
  to {width:0;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="flex items-center justify-center min-h-screen px-4 text-white">

<div class="card text-center" id="card">

  <!-- LOGO -->
  <img src="logo.png"
       onerror="this.src='https://i.imgur.com/7yUvePI.png'"
       class="w-16 mx-auto mb-4">

  <h1 class="text-2xl font-semibold">Echo Lounge</h1>
  <p class="text-gray-400 text-sm mb-6">Discord Community</p>

  <!-- MENU -->
  <div id="menu" class="space-y-3">

    <a href="https://discord.gg/LINK_KAMU"
       class="btn flex items-center justify-center gap-2 py-3 rounded-xl bg-[#5865F2]">
       <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="w-5">
       Join Discord
    </a>

    <a href="https://tiktok.com/@username"
       class="btn flex items-center justify-center gap-2 py-3 rounded-xl bg-black border border-gray-700">
       <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" class="w-5">
       TikTok
    </a>

    <button onclick="openForm()"
      class="btn w-full py-3 rounded-xl bg-gray-800 hover:bg-gray-700">
      💬 Kritik & Saran
    </button>

  </div>

  <!-- FORM -->
  <div id="form" class="hidden">

    <button onclick="backMenu()" class="text-sm text-gray-400 mb-3">
      ← Kembali
    </button>

    <div class="flex gap-2 mb-3">
      <button onclick="setType('Kritik')" id="kritikBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Kritik</button>

      <button onclick="setType('Saran')" id="saranBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Saran</button>
    </div>

    <textarea id="pesan"
      class="w-full p-3 rounded-lg bg-black/40 border border-gray-700"
      placeholder="Tulis pesan..."></textarea>

    <button onclick="kirimPesan()"
      class="btn w-full mt-3 py-3 rounded-xl bg-green-600">
      Kirim
    </button>

  </div>

</div>
</div>

<!-- TOAST -->
<div id="toast"
 class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 w-64 rounded-xl overflow-hidden toast text-white">
  <div class="p-3 text-center text-sm" id="toastMsg"></div>
  <div class="progress"></div>
</div>

<script>
/* PARTICLES */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

c.width = innerWidth;
c.height = innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
  });
  requestAnimationFrame(draw);
}
draw();

/* LIGHT FOLLOW CURSOR */
document.addEventListener("mousemove",(e)=>{
  const card = document.getElementById("card");
  const rect = card.getBoundingClientRect();
  card.style.setProperty('--x', e.clientX - rect.left + "px");
  card.style.setProperty('--y', e.clientY - rect.top + "px");
});

/* FORM */
let selectedType=null;

function openForm(){
  menu.classList.add("hidden");
  form.classList.remove("hidden");
}

function backMenu(){
  form.classList.add("hidden");
  menu.classList.remove("hidden");
}

function setType(type){
  selectedType=type;
  kritikBtn.classList.remove("bg-indigo-600");
  saranBtn.classList.remove("bg-indigo-600");
  if(type==="Kritik") kritikBtn.classList.add("bg-indigo-600");
  else saranBtn.classList.add("bg-indigo-600");
}

/* TOAST */
function showToast(msg){
  const t=document.getElementById("toast");
  toastMsg.innerText=msg;
  t.classList.remove("hidden");
  setTimeout(()=>t.classList.add("hidden"),2500);
}

/* SEND */
async function kirimPesan(){
  const pesan=document.getElementById("pesan").value;

  if(!selectedType) return showToast("Pilih dulu!");
  if(!pesan) return showToast("Isi pesan dulu!");

  const webhookURL="WEBHOOK_KAMU";

  const data={
    embeds:[{
      title:`📩 ${selectedType}`,
      description:pesan,
      color:selectedType==="Kritik"?16711680:65280
    }]
  };

  try{
    await fetch(webhookURL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify(data)
    });

    showToast("Berhasil 🚀");
    pesan.value="";

  }catch{
    showToast("Gagal ❌");
  }
}
</script>

</body>
</html>
