<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Connect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

        :root {
            --bg: #05070a;
            --card: #0d1117;
            --accent: #6366f1;
            --text: #ffffff;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        .light-mode {
            --bg: #f8fafc;
            --card: #ffffff;
            --accent: #4f46e5;
            --text: #0f172a;
            --input-bg: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .glass-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .light-mode .glass-card {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }

        /* Teks Input agar selalu kelihatan */
        textarea, input {
            background: var(--input-bg) !important;
            color: var(--text) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
        }
        .light-mode textarea {
            border: 1px solid rgba(0, 0, 0, 0.1) !important;
        }

        .btn-action {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.2);
            box-shadow: 0 10px 20px -5px var(--accent);
        }

        .toast-ui {
            animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="flex justify-center items-center min-h-screen px-6">

    <button onclick="toggleTheme()" class="fixed top-8 right-8 w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 border border-white/10 z-50 transition-transform active:scale-90">
        <i id="tIcon" class="fas fa-moon text-indigo-400"></i>
    </button>

    <div class="glass-card w-full max-w-[380px] p-10 relative text-center">
        <div id="pfpArea" class="relative inline-block mb-8">
            <div class="absolute inset-0 bg-indigo-500 blur-3xl opacity-20"></div>
            <img src="https://i.imgur.com/7yUvePI.png" 
                 class="w-24 h-24 mx-auto rounded-[2.5rem] relative border-4 border-indigo-500/20 shadow-2xl p-1 bg-white" 
                 alt="EC Logo">
        </div>

        <h1 class="text-3xl font-extrabold tracking-tight mb-2">Echo Lounge</h1>
        <p class="text-sm opacity-50 font-medium mb-10 tracking-wide uppercase">Community Hub</p>

        <div id="menuGroup" class="space-y-4">
            <a href="https://discord.gg/jRkcCFdT4T" target="_blank"
               class="btn-action flex items-center justify-center gap-3 py-4 rounded-2xl bg-[#5865F2] font-bold text-white">
                <i class="fab fa-discord text-xl"></i> Join Server
            </a>

            <a href="https://tiktok.com/@sean_logs" target="_blank"
               class="btn-action flex items-center justify-center gap-3 py-4 rounded-2xl bg-slate-800/50 border border-white/5 font-bold">
                <i class="fab fa-tiktok text-xl"></i> TikTok
            </a>

            <button onclick="switchView('form')"
                    class="btn-action w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-violet-600 font-bold text-white mt-6">
                <i class="fa-solid fa-comment-dots"></i> Kritik & Saran
            </button>
        </div>

        <div id="formGroup" class="hidden text-left">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="switchView('menu')" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-white/5">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <span class="font-bold text-lg">Feedback</span>
            </div>

            <div class="flex gap-2 mb-4">
                <button onclick="setType('Kritik', this)" class="type-btn flex-1 py-3 rounded-xl bg-white/5 border border-white/10 font-bold text-[10px] uppercase tracking-widest transition-all">🚨 Kritik</button>
                <button onclick="setType('Saran', this)" class="type-btn flex-1 py-3 rounded-xl bg-white/5 border border-white/10 font-bold text-[10px] uppercase tracking-widest transition-all">💡 Saran</button>
            </div>

            <textarea id="pesanInput" rows="4" 
                      class="w-full p-4 rounded-2xl outline-none text-sm placeholder:opacity-30 mb-4" 
                      placeholder="Apa yang ingin kamu sampaikan?"></textarea>

            <button id="sendBtn" onclick="submitFeedback()"
                    class="w-full py-4 rounded-2xl bg-indigo-600 font-extrabold text-white shadow-xl shadow-indigo-900/20 active:scale-95 transition-all">
                KIRIM SEKARANG
            </button>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-12 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl font-bold shadow-2xl z-[100] toast-ui"></div>

    <script>
        let feedbackType = "";
        const webhook = "https://discord.com/api/webhooks/1501586415941582918/ALwCGRA0veR8KS-Lrix7Gdeky7gPagBN_ViHmU-R4O0HKFLPUIT5jbGir0SEm9N1tm8j";

        // Animasi Pembuka
        gsap.from(".glass-card", { duration: 1, scale: 0.8, opacity: 0, ease: "back.out(1.7)" });

        function toggleTheme() {
            document.body.classList.toggle("light-mode");
            const isLight = document.body.classList.contains("light-mode");
            document.getElementById("tIcon").className = isLight ? "fas fa-sun text-orange-400" : "fas fa-moon text-indigo-400";
        }

        function switchView(view) {
            const menu = document.getElementById("menuGroup");
            const form = document.getElementById("formGroup");

            if(view === 'form') {
                gsap.to(menu, { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                    menu.classList.add("hidden");
                    form.classList.remove("hidden");
                    gsap.fromTo(form, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.4 });
                }});
            } else {
                gsap.to(form, { opacity: 0, y: 20, duration: 0.3, onComplete: () => {
                    form.classList.add("hidden");
                    menu.classList.remove("hidden");
                    gsap.fromTo(menu, { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.4 });
                }});
            }
        }

        function setType(type, btn) {
            feedbackType = type;
            document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('bg-indigo-600', 'text-white'));
            btn.classList.add('bg-indigo-600', 'text-white');
        }

        function showToast(text, isError = false) {
            const t = document.getElementById("toast");
            t.innerText = text;
            t.style.background = isError ? "#ef4444" : "#6366f1";
            t.classList.remove("hidden");
            setTimeout(() => t.classList.add("hidden"), 3000);
        }

        async function submitFeedback() {
            const msg = document.getElementById("pesanInput").value;
            const btn = document.getElementById("sendBtn");

            if(!feedbackType) return showToast("Pilih kategori dulu!", true);
            if(!msg.trim()) return showToast("Pesan masih kosong!", true);

            btn.disabled = true;
            btn.innerText = "MENGIRIM...";

            try {
                await fetch(webhook, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        embeds: [{
                            title: `📩 Feedback: ${feedbackType}`,
                            description: msg,
                            color: feedbackType === "Kritik" ? 15548997 : 5763719,
                            footer: { text: "Echo Lounge Hub" },
                            timestamp: new Date()
                        }]
                    })
                });
                showToast("🚀 Terkirim ke Discord!");
                document.getElementById("pesanInput").value = "";
                setTimeout(() => switchView('menu'), 1000);
            } catch {
                showToast("❌ Gagal mengirim!", true);
            }
            btn.disabled = false;
            btn.innerText = "KIRIM SEKARANG";
        }
    </script>
</body>
</html>
