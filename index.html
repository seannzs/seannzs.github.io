<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Lounge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(135deg, #020617, #0f172a);
}

.glass {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
}

.fade {
  animation: fade 0.3s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body class="text-white flex items-center justify-center min-h-screen px-4">

<div class="glass rounded-2xl p-6 w-full max-w-sm text-center">

  <!-- LOGO -->
  <img src="logo.png"
       class="w-24 mx-auto mb-4">

  <h1 class="text-2xl font-bold">Echo Lounge</h1>
  <p class="text-gray-400 text-sm mb-6">Discord Community</p>

  <!-- MENU UTAMA -->
  <div id="menuUtama" class="space-y-3 fade">

    <!-- DISCORD -->
    <a href="https://discord.gg/LINK_KAMU"
       class="flex items-center justify-center gap-2 py-3 rounded-xl bg-[#5865F2] hover:opacity-90 transition">

      <!-- ICON DISCORD -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
        <path d="M20.317 4.369A19.791 19.791 0 0016.885 3c-.162.29-.35.682-.48.987a18.27 18.27 0 00-5.81 0 10.32 10.32 0 00-.487-.987 19.736 19.736 0 00-3.435 1.372C3.873 9.045 3.206 13.579 3.53 18.057a19.904 19.904 0 006.036 3.06c.487-.667.92-1.37 1.295-2.11-.71-.267-1.387-.6-2.02-.985.17-.124.335-.252.495-.384 3.9 1.83 8.13 1.83 11.984 0 .16.132.325.26.495.384-.633.386-1.31.718-2.02.985.375.74.808 1.443 1.295 2.11a19.87 19.87 0 006.036-3.06c.376-5.177-.636-9.67-2.808-13.688zM9.545 15.995c-1.18 0-2.15-1.08-2.15-2.407 0-1.327.946-2.407 2.15-2.407 1.21 0 2.17 1.09 2.15 2.407 0 1.327-.946 2.407-2.15 2.407zm4.91 0c-1.18 0-2.15-1.08-2.15-2.407 0-1.327.946-2.407 2.15-2.407 1.21 0 2.17 1.09 2.15 2.407 0 1.327-.946 2.407-2.15 2.407z"/>
      </svg>

      Join Discord
    </a>

    <!-- TIKTOK -->
    <a href="https://tiktok.com/@username"
       class="flex items-center justify-center gap-2 py-3 rounded-xl bg-black border border-gray-700 hover:bg-gray-900 transition">

      <!-- ICON TIKTOK -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
        <path d="M12.75 2h2.5c.09 1.3.54 2.58 1.42 3.6.88 1.01 2.07 1.74 3.33 2.08v2.6c-1.52-.04-3-.45-4.27-1.2v5.92c0 3.01-2.44 5.45-5.45 5.45A5.45 5.45 0 015 15.99c0-3.01 2.44-5.45 5.45-5.45.34 0 .67.03.99.09v2.7a2.75 2.75 0 00-.99-.18 2.76 2.76 0 000 5.52 2.76 2.76 0 002.76-2.76V2z"/>
      </svg>

      TikTok
    </a>

    <!-- MENU KRITIK -->
    <button onclick="openForm()"
      class="w-full py-3 rounded-xl bg-gray-800 hover:bg-gray-700 transition">
      💬 Kirim Kritik & Saran
    </button>

  </div>

  <!-- FORM -->
  <div id="formBox" class="hidden fade">

    <button onclick="backMenu()" class="text-sm text-gray-400 mb-3">
      ← Kembali
    </button>

    <div class="flex gap-2 mb-3">
      <button onclick="setType('Kritik')" id="kritikBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Kritik</button>

      <button onclick="setType('Saran')" id="saranBtn"
        class="flex-1 py-2 rounded-lg bg-gray-800">Saran</button>
    </div>

    <textarea id="pesan"
      class="w-full p-3 rounded-lg bg-black/40 border border-gray-700 focus:outline-none"
      placeholder="Tulis pesan..."></textarea>

    <button onclick="kirimPesan()"
      class="w-full mt-3 py-3 rounded-xl bg-green-600 hover:bg-green-700">
      Kirim
    </button>

  </div>

</div>

<!-- TOAST -->
<div id="toast"
  class="hidden fixed bottom-5 left-1/2 -translate-x-1/2 bg-black px-4 py-2 rounded-lg text-sm border border-gray-700">
</div>

<script>
let selectedType = null;

function openForm() {
  document.getElementById("menuUtama").classList.add("hidden");
  document.getElementById("formBox").classList.remove("hidden");
}

function backMenu() {
  document.getElementById("formBox").classList.add("hidden");
  document.getElementById("menuUtama").classList.remove("hidden");
}

function setType(type) {
  selectedType = type;

  document.getElementById("kritikBtn").classList.remove("bg-indigo-600");
  document.getElementById("saranBtn").classList.remove("bg-indigo-600");

  if (type === "Kritik") {
    document.getElementById("kritikBtn").classList.add("bg-indigo-600");
  } else {
    document.getElementById("saranBtn").classList.add("bg-indigo-600");
  }
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.remove("hidden");

  setTimeout(() => {
    toast.classList.add("hidden");
  }, 2500);
}

async function kirimPesan() {
  const pesan = document.getElementById("pesan").value;

  if (!selectedType) return showToast("Pilih dulu!");
  if (!pesan) return showToast("Isi pesan dulu!");

  const webhookURL = "WEBHOOK_KAMU";

  const data = {
    embeds: [{
      title: `📩 ${selectedType}`,
      description: pesan,
      color: selectedType === "Kritik" ? 16711680 : 65280,
      timestamp: new Date()
    }]
  };

  try {
    await fetch(webhookURL, {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify(data)
    });

    showToast("Terkirim!");
    document.getElementById("pesan").value = "";

  } catch {
    showToast("Gagal kirim!");
  }
}
</script>

</body>
</html>
