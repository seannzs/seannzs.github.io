<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo Lounge</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">

  <!-- Container -->
  <div class="min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo -->
    <img src="logo.png" alt="Echo Lounge" class="w-28 mb-6">

    <!-- Title -->
    <h1 class="text-3xl font-bold mb-2">Echo Lounge</h1>
    <p class="text-gray-400 mb-6 text-center">Welcome to our Discord community</p>

    <!-- Buttons -->
    <div class="w-full max-w-xs space-y-3">
      
      <!-- Discord -->
      <a href="https://discord.gg/LINK_KAMU"
         class="block w-full text-center bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl transition">
         Join Discord
      </a>

      <!-- TikTok -->
      <a href="https://tiktok.com/@username"
         class="block w-full text-center bg-pink-600 hover:bg-pink-700 py-3 rounded-xl transition">
         TikTok
      </a>

    </div>

    <!-- Kritik & Saran -->
    <div class="w-full max-w-xs mt-8">
      <h2 class="text-lg mb-2">Kritik & Saran</h2>
      
      <textarea id="pesan"
        class="w-full p-3 rounded-lg bg-gray-900 border border-gray-700 focus:outline-none"
        placeholder="Tulis pesan kamu..."></textarea>

      <button onclick="kirimPesan()"
        class="w-full mt-3 bg-green-600 hover:bg-green-700 py-3 rounded-xl transition">
        Kirim
      </button>
    </div>

  </div>

  <script>
    async function kirimPesan() {
      const pesan = document.getElementById("pesan").value;

      if (!pesan) {
        alert("Isi pesan dulu!");
        return;
      }

      const webhookURL = "WEBHOOK_KAMU_DISINI";

      const data = {
        content: "📩 **Kritik & Saran Baru (Echo Lounge)**\n" + pesan
      };

      try {
        await fetch(webhookURL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });

        alert("Pesan berhasil dikirim!");
        document.getElementById("pesan").value = "";
      } catch (error) {
        alert("Gagal kirim pesan!");
      }
    }
  </script>

</body>
</html>
