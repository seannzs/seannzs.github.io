<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Lounge</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin:0;
  background:#020617;
  font-family:sans-serif;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  border:1px solid rgba(255,255,255,0.08);
  padding:28px;
  max-width:360px;
  width:100%;
  box-shadow:0 20px 60px rgba(0,0,0,0.7);
}

/* BUTTON */
.btn {
  transition:0.25s;
}
.btn:hover { transform: translateY(-2px); }
.btn:active { transform: scale(0.96); }

/* TOAST */
.toast {
  backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.7);
  border:1px solid rgba(255,255,255,0.1);
  animation:fade 0.3s;
}
@keyframes fade {
  from {opacity:0; transform:translateY(20px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="text-white flex justify-center items-center min-h-screen px-4">

<div class="card text-center">

<img src="logo.png"
onerror="this.src='https://i.imgur.com/7yUvePI.png'"
class="w-16 mx-auto mb-4">

<h1 class="text-2xl font-semibold">Echo Lounge</h1>
<p class="text-gray-400 text-sm mb-6">Discord Community</p>

<!-- MENU -->
<div id="menu" class="space-y-3">

<a href="https://discord.gg/LINK_KAMU" target="_blank"
class="btn block py-3 rounded-xl bg-[#5865F2]">
🚀 Join Discord
</a>

<a href="https://tiktok.com/@username" target="_blank"
class="btn block py-3 rounded-xl bg-black border border-gray-700">
🎵 TikTok
</a>

<button onclick="openForm()"
class="btn w-full py-3 rounded-xl bg-gray-800">
💬 Kritik & Saran
</button>

</div>

<!-- FORM -->
<div id="form" class="hidden">

<button onclick="backMenu()" class="text-sm text-gray-400 mb-3">
← Kembali
</button>

<div class="flex gap-2 mb-3">
<button onclick="setType('Kritik')" id="kritikBtn"
class="flex-1 py-2 rounded-lg bg-gray-800">Kritik</button>

<button onclick="setType('Saran')" id="saranBtn"
class="flex-1 py-2 rounded-lg bg-gray-800">Saran</button>
</div>

<textarea id="pesan"
class="w-full p-3 rounded-lg bg-black/40 border border-gray-700"
placeholder="Tulis pesan..."></textarea>

<button id="sendBtn" onclick="kirimPesan()"
class="btn w-full mt-3 py-3 rounded-xl bg-green-600">
Kirim
</button>

</div>

</div>

<!-- TOAST -->
<div id="toast"
class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg text-sm toast">
</div>

<script>
let selectedType = null;

function openForm(){
  document.getElementById("menu").classList.add("hidden");
  document.getElementById("form").classList.remove("hidden");
}

function backMenu(){
  document.getElementById("form").classList.add("hidden");
  document.getElementById("menu").classList.remove("hidden");
}

function setType(type){
  selectedType = type;

  kritikBtn.classList.remove("bg-indigo-600");
  saranBtn.classList.remove("bg-indigo-600");

  if(type==="Kritik") kritikBtn.classList.add("bg-indigo-600");
  else saranBtn.classList.add("bg-indigo-600");
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("hidden");

  setTimeout(()=>t.classList.add("hidden"),2000);
}

async function kirimPesan(){
  const pesanEl = document.getElementById("pesan");
  const pesan = pesanEl.value;
  const btn = document.getElementById("sendBtn");

  if(!selectedType) return showToast("Pilih dulu!");
  if(!pesan) return showToast("Isi pesan dulu!");

  btn.innerText = "Mengirim...";
  btn.disabled = true;

  const webhookURL = "WEBHOOK_KAMU";

  try{
    await fetch(webhookURL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        embeds:[{
          title:`📩 ${selectedType}`,
          description:pesan,
          color:selectedType==="Kritik"?16711680:65280
        }]
      })
    });

    showToast("Berhasil dikirim 🚀");
    pesanEl.value="";

  }catch{
    showToast("Gagal kirim ❌");
  }

  btn.innerText = "Kirim";
  btn.disabled = false;
}
</script>

</body>
</html>
