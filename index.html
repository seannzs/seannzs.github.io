<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Connect</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --bg: #020617; /* Ultra Dark Black-Blue */
            --card-gradient-1: #0f172a;
            --card-gradient-2: #1e293b;
            --text-main: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.6);
            --border-glass: rgba(255, 255, 255, 0.04);
            --notif-bg: rgba(15, 23, 42, 0.95);
        }

        .light-mode {
            --bg: #f8fafc;
            --card-gradient-1: #ffffff;
            --card-gradient-2: #f1f5f9;
            --text-main: #0f172a;
            --text-dim: #64748b;
            --border-glass: rgba(0, 0, 0, 0.04);
            --notif-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            transition: background-color 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        /* Glassmorphism Card with Smooth Gradient */
        .card {
            background: linear-gradient(135deg, var(--card-gradient-1), var(--card-gradient-2));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.4);
        }

        /* Minimalist Button Effect */
        .btn-minimal {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .btn-minimal:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-minimal:active { transform: scale(0.97); }

        /* Smooth Toast Animation */
        .toast-minimal {
            backdrop-filter: blur(20px);
            background: var(--notif-bg);
            border: 1px solid var(--border-glass);
            animation: slideInBottom 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes slideInBottom {
            from { transform: translate(-50%, 80px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>

<body class="flex justify-center items-center min-h-screen px-4">

<button onclick="toggleTheme()" class="fixed top-8 right-8 p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all z-50">
    <i id="themeIcon" class="fas fa-moon text-indigo-400"></i>
</button>

<div class="card w-full max-w-[380px] p-8 text-center relative overflow-hidden" id="mainCard">
    <div class="relative inline-block mb-6 group">
        <div class="absolute inset-0 bg-indigo-500 blur-2xl opacity-10 group-hover:opacity-20 transition-opacity duration-500"></div>
        <img src="https://i.imgur.com/7yUvePI.png" 
             class="w-24 h-24 mx-auto rounded-[2rem] relative border-2 border-white/20 shadow-2xl bg-white p-2"
             alt="Logo">
    </div>

    <h1 class="text-3xl font-bold tracking-tighter mb-1">Echo Lounge</h1>
    <div class="h-1 w-10 bg-indigo-500 mx-auto rounded-full mb-8"></div>

    <div id="menuContent" class="space-y-4">
        <a href="https://discord.gg/jRkcCFdT4T" target="_blank"
           class="btn-minimal flex items-center justify-center gap-3 py-4 rounded-2xl bg-[#5865F2] font-bold text-white shadow-lg shadow-indigo-500/10">
            <i class="fab fa-discord text-xl"></i>
            Join Server
        </a>

        <a href="https://tiktok.com/@sean_logs" target="_blank"
           class="btn-minimal flex items-center justify-center gap-3 py-4 rounded-2xl bg-white/5 border border-white/10 font-semibold hover:bg-white/10">
            <i class="fab fa-tiktok text-xl"></i>
            Follow TikTok
        </a>

        <button onclick="navigate('form')"
                class="btn-minimal w-full flex items-center justify-center gap-3 py-4 rounded-2xl bg-white/5 border border-white/10 font-semibold hover:bg-white/10 mt-2">
            <i class="fa-solid fa-comment-dots text-indigo-400"></i>
            Kritik & Saran
        </button>
    </div>

    <div id="formContent" class="hidden text-left">
        <div class="flex items-center mb-6">
            <button onclick="navigate('menu')" class="p-2 hover:bg-white/5 rounded-full transition">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="flex-1 font-bold mr-8 text-lg">Send Feedback</span>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4">
            <button onclick="setType('Kritik')" id="kBtn" class="py-2.5 rounded-xl bg-white/5 border border-white/5 transition-all text-xs font-bold uppercase tracking-widest hover:border-indigo-500">🚨 Kritik</button>
            <button onclick="setType('Saran')" id="sBtn" class="py-2.5 rounded-xl bg-white/5 border border-white/5 transition-all text-xs font-bold uppercase tracking-widest hover:border-indigo-500">💡 Saran</button>
        </div>

        <textarea id="msg" rows="4"
                  class="w-full p-4 rounded-xl bg-black/30 border border-white/10 focus:border-indigo-500 transition-all text-sm resize-none mb-4 outline-none"
                  placeholder="Ketik pesanmu di sini..."></textarea>

        <button id="submitBtn" onclick="sendToDiscord()"
                class="btn-minimal w-full py-4 rounded-2xl bg-indigo-600 font-extrabold shadow-xl shadow-indigo-900/10 uppercase tracking-widest text-xs">
            Submit
        </button>
    </div>
</div>

<div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-sm font-bold toast-minimal z-[100] shadow-xl border border-white/10"></div>

<script>
    let currentType = null;
    const webhook = "https://discord.com/api/webhooks/1501586415941582918/ALwCGRA0veR8KS-Lrix7Gdeky7gPagBN_ViHmU-R4O0HKFLPUIT5jbGir0SEm9N1tm8j";

    // Intro Animation
    gsap.from("#mainCard", { duration: 1.2, scale: 0.9, opacity: 0, ease: "expo.out" });

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById("themeIcon");
        body.classList.toggle("light-mode");
        icon.classList.toggle("fa-moon");
        icon.classList.toggle("fa-sun");
        
        gsap.from(body, { backgroundColor: body.classList.contains("light-mode") ? "#020617" : "#f8fafc", duration: 0.6 });
    }

    function navigate(target) {
        const menu = document.getElementById("menuContent");
        const form = document.getElementById("formContent");

        if(target === 'form') {
            gsap.to(menu, { opacity: 0, x: -30, duration: 0.3, onComplete: () => {
                menu.classList.add("hidden");
                form.classList.remove("hidden");
                gsap.fromTo(form, { opacity: 0, x: 30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" });
            }});
        } else {
            gsap.to(form, { opacity: 0, x: 30, duration: 0.3, onComplete: () => {
                form.classList.add("hidden");
                menu.classList.remove("hidden");
                gsap.fromTo(menu, { opacity: 0, x: -30 }, { opacity: 1, x: 0, duration: 0.5, ease: "power2.out" });
            }});
        }
    }

    function setType(type) {
        currentType = type;
        const k = document.getElementById("kBtn");
        const s = document.getElementById("sBtn");
        [k, s].forEach(el => el.classList.remove("bg-indigo-600", "border-indigo-400"));
        
        (type === 'Kritik' ? k : s).classList.add("bg-indigo-600", "border-indigo-400");
    }

    function toast(text, type = "success") {
        const t = document.getElementById("toast");
        t.innerText = text;
        
        if (type === "success") {
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-sm font-bold toast-minimal z-[100] shadow-xl border border-indigo-500 bg-indigo-600 text-white";
        } else {
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 px-6 py-4 rounded-2xl text-sm font-bold toast-minimal z-[100] shadow-xl border border-red-500 bg-red-600 text-white";
        }

        t.classList.remove("hidden");
        setTimeout(() => t.classList.add("hidden"), 3000);
    }

    async function sendToDiscord() {
        const msg = document.getElementById("msg").value;
        const btn = document.getElementById("submitBtn");

        if(!currentType) return toast("⚠️ Pilih tipe dulu!", "error");
        if(!msg.trim()) return toast("⚠️ Pesan kosong!", "error");

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner animate-spin"></i> Submitting...';

        try {
            await fetch(webhook, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    embeds: [{
                        title: `📩 Feedback: ${currentType}`,
                        description: `**Pesan:**\n${msg}`,
                        color: currentType === "Kritik" ? 15548997 : 5763719,
                        timestamp: new Date()
                    }]
                })
            });
            toast("🚀 Berhasil Dikirim!");
            document.getElementById("msg").value = "";
            setTimeout(() => navigate('menu'), 1500);
        } catch {
            toast("❌ Gagal Kirim", "error");
        }
        btn.disabled = false;
        btn.innerText = "Submit";
    }
</script>

</body>
</html>
