<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Sean</title>

    <!-- Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        body { 
            background: radial-gradient(circle at top, #0f172a, #020617 60%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Glow Background */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 500px;
            height: 500px;
            filter: blur(200px);
            opacity: 0.2;
            z-index: -1;
        }
        body::before {
            top: -200px;
            left: -200px;
            background: #3b82f6;
        }
        body::after {
            bottom: -200px;
            right: -200px;
            background: #a855f7;
        }

        /* Loader */
        #loader {
            position: fixed;
            inset: 0;
            background: #020617;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .load-bar {
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            overflow: hidden;
        }

        .load-progress {
            height: 100%;
            width: 0%;
            background: #3b82f6;
        }

        /* Glass */
        .glass {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }
        .glass:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Avatar Glow */
        .profile-glow {
            box-shadow: 0 0 40px rgba(59,130,246,0.5),
                        0 0 80px rgba(168,85,247,0.3);
        }

        /* Gradient Text */
        .name-gradient {
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .reveal { opacity: 0; transform: translateY(20px); }

        /* Input */
        input, textarea {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
        }
        input:focus, textarea:focus {
            border: 1px solid rgba(59,130,246,0.6);
            box-shadow: 0 0 15px rgba(59,130,246,0.2);
        }

        /* Button */
        #btn-submit {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            box-shadow: 0 10px 30px rgba(59,130,246,0.3);
        }
        #btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(59,130,246,0.5);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            z-index: 10000;
            transition: 0.4s;
        }
        .toast.active {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

<!-- Toast -->
<div id="toast" class="toast glass px-6 py-3 rounded-xl text-xs font-bold"></div>

<!-- Loader -->
<div id="loader">
    <h2 class="text-2xl font-bold name-gradient">SEAN</h2>
    <div class="load-bar"><div id="progress" class="load-progress"></div></div>
</div>

<!-- Main -->
<main class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md space-y-8 text-center">

        <!-- Avatar -->
        <div class="flex justify-center reveal">
            <div class="w-28 h-28 rounded-3xl p-[2px] bg-gradient-to-tr from-blue-500 to-purple-600">
                <div class="w-full h-full rounded-3xl bg-slate-950 overflow-hidden profile-glow">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sean">
                </div>
            </div>
        </div>

        <!-- Nama -->
        <div class="reveal">
            <h1 class="text-4xl font-extrabold name-gradient">SEAN</h1>
            <p class="text-xs text-slate-400">Seannz</p>
        </div>

        <!-- Sosial -->
        <div class="space-y-3">
            <a href="#" onclick="checkLink(event,this)" class="glass p-4 rounded-2xl flex justify-between reveal">
                <span>WhatsApp</span>
                <i data-lucide="chevron-right"></i>
            </a>

            <a href="#" onclick="checkLink(event,this)" class="glass p-4 rounded-2xl flex justify-between reveal">
                <span>Instagram</span>
                <i data-lucide="lock"></i>
            </a>

            <a href="https://discord.gg/jRkcCFdT4T" class="glass p-4 rounded-2xl flex justify-between reveal">
                <span>Discord</span>
                <i data-lucide="external-link"></i>
            </a>
        </div>

        <!-- Form -->
        <form id="contactForm" class="space-y-3 reveal">
            <input id="name" placeholder="Nama..." class="w-full p-3 rounded-xl">
            <textarea id="message" placeholder="Pesan..." class="w-full p-3 rounded-xl"></textarea>

            <button id="btn-submit" class="w-full py-3 rounded-xl flex justify-center gap-2">
                <span>Kirim</span>
                <i data-lucide="send"></i>
            </button>
        </form>

    </div>
</main>

<script>
const WEBHOOK_URL = "PASTE_WEBHOOK_KAMU";

lucide.createIcons();

// Loader
window.onload = () => {
    gsap.to("#progress", {
        width: "100%",
        duration: 1,
        onComplete: () => {
            gsap.to("#loader", { opacity: 0, onComplete: () => loader.remove() });
            gsap.to(".reveal", { opacity: 1, y: 0, stagger: 0.1 });
        }
    });
};

// Toast
function toast(msg){
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("active");
    setTimeout(()=>t.classList.remove("active"),2000);
}

// Link check
function checkLink(e, el){
    if(el.getAttribute("href") === "#"){
        e.preventDefault();
        toast("Belum tersedia");
    }
}

// Form
document.getElementById("contactForm").onsubmit = async(e)=>{
    e.preventDefault();

    const name = name.value.trim();
    const msg = message.value.trim();

    if(!name || !msg) return toast("Isi dulu!");

    await fetch(WEBHOOK_URL,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            content:`Pesan dari ${name}:\n${msg}`
        })
    });

    toast("Terkirim!");
    contactForm.reset();
};
</script>

</body>
</html>
