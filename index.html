<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Lounge | Community</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        body {
            margin: 0;
            background: radial-gradient(circle at top right, #1e1b4b, #020617);
            font-family: 'Inter', sans-serif;
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 32px;
            max-width: 380px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }
        .btn:active { transform: scale(0.97); }

        .toast {
            backdrop-filter: blur(20px);
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translate(-50%, 40px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }
    </style>
</head>

<body class="text-white flex justify-center items-center min-h-screen px-4">

<div class="card text-center">
    <div class="relative inline-block mb-6">
        <div class="absolute inset-0 bg-indigo-500 blur-2xl opacity-20 rounded-full"></div>
        <img src="https://api.screenshot.net/v1/get?url=https://files.oaiusercontent.com/file-K1F8i6eYjGz2xZlX8G3P3D&width=200" 
             onerror="this.src='https://i.imgur.com/7yUvePI.png'"
             class="w-20 h-20 mx-auto rounded-2xl relative border border-white/10 shadow-xl bg-white p-1"
             alt="Echo Lounge Logo">
    </div>

    <h1 class="text-2xl font-bold tracking-tight">Echo Lounge</h1>
    <p class="text-indigo-300/70 text-sm font-medium mb-8">Exclusive Discord Community</p>

    <div id="menu" class="space-y-4">
        <a href="https://discord.gg/jRkcCFdT4T" target="_blank" onclick="checkLink(event, this)"
           class="btn py-3.5 rounded-2xl bg-[#5865F2] font-semibold text-white">
            <i class="fab fa-discord text-xl"></i>
            Join Discord
        </a>

        <a href="https://tiktok.com/@username" target="_blank" onclick="checkLink(event, this)"
           class="btn py-3.5 rounded-2xl bg-white/5 border border-white/10 font-semibold hover:bg-white/10">
            <i class="fab fa-tiktok text-xl"></i>
            TikTok
        </a>

        <button onclick="openForm()"
                class="btn w-full py-3.5 rounded-2xl bg-gradient-to-tr from-slate-800 to-slate-700 border border-slate-600 font-semibold mt-2">
            <i class="fa-solid fa-comment-dots text-lg text-indigo-400"></i>
            Kritik & Saran
        </button>
    </div>

    <div id="form" class="hidden">
        <div class="flex items-center mb-6">
            <button onclick="backMenu()" class="p-2 hover:bg-white/5 rounded-full transition">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <span class="flex-1 font-semibold mr-8">Kirim Masukan</span>
        </div>

        <div class="flex gap-3 mb-4">
            <button onclick="setType('Kritik')" id="kritikBtn"
                    class="flex-1 py-2.5 rounded-xl bg-white/5 border border-white/5 transition-all duration-300 text-sm font-medium">
                🚨 Kritik
            </button>
            <button onclick="setType('Saran')" id="saranBtn"
                    class="flex-1 py-2.5 rounded-xl bg-white/5 border border-white/5 transition-all duration-300 text-sm font-medium">
                💡 Saran
            </button>
        </div>

        <textarea id="pesan" rows="4"
                  class="w-full p-4 rounded-xl bg-black/40 border border-white/10 focus:border-indigo-500 transition-all text-sm resize-none"
                  placeholder="Tulis sesuatu..."></textarea>

        <button id="sendBtn" onclick="kirimPesan()"
                class="btn w-full mt-4 py-3.5 rounded-2xl bg-indigo-600 font-bold shadow-lg shadow-indigo-900/20">
            Kirim Sekarang
        </button>
    </div>
</div>

<div id="toast" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 rounded-2xl text-sm font-medium toast z-50">
</div>

<script>
    let selectedType = null;

    // --- AUTO DETECTION LINK ---
    function checkLink(event, element) {
        const url = element.getAttribute('href');
        // Mendeteksi jika link masih default/belum di-setting
        if (url.includes("LINK_KAMU") || url.includes("@username")) {
            event.preventDefault(); // Mencegah link terbuka
            showToast("Link belum di-setting oleh Admin!", true);
        }
    }

    function openForm(){
        document.getElementById("menu").classList.add("hidden");
        document.getElementById("form").classList.remove("hidden");
    }

    function backMenu(){
        document.getElementById("form").classList.add("hidden");
        document.getElementById("menu").classList.remove("hidden");
    }

    function setType(type){
        selectedType = type;
        const kritikBtn = document.getElementById("kritikBtn");
        const saranBtn = document.getElementById("saranBtn");

        [kritikBtn, saranBtn].forEach(btn => {
            btn.classList.remove("bg-indigo-600", "border-indigo-400");
            btn.classList.add("bg-white/5", "border-white/5");
        });

        const activeBtn = type === "Kritik" ? kritikBtn : saranBtn;
        activeBtn.classList.remove("bg-white/5", "border-white/5");
        activeBtn.classList.add("bg-indigo-600", "border-indigo-400");
    }

    function showToast(msg, isError = false){
        const t = document.getElementById("toast");
        t.innerHTML = isError ? `<i class="fa-solid fa-triangle-exclamation mr-2 text-yellow-400"></i> ${msg}` : `<i class="fa-solid fa-circle-check mr-2 text-green-400"></i> ${msg}`;
        t.classList.remove("hidden");
        
        setTimeout(() => t.classList.add("hidden"), 3000);
    }

    async function kirimPesan(){
        const pesanEl = document.getElementById("pesan");
        const btn = document.getElementById("sendBtn");
        const webhookURL = "WEBHOOK_KAMU"; 

        if(!selectedType) return showToast("Pilih tipe masukan!", true);
        if(!pesanEl.value.trim()) return showToast("Pesan masih kosong!", true);
        if(webhookURL === "WEBHOOK_KAMU") return showToast("Webhook belum di-setting!", true);

        btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i>';
        btn.disabled = true;

        try {
            await fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    embeds: [{
                        title: `📩 ${selectedType}`,
                        description: pesanEl.value,
                        color: selectedType === "Kritik" ? 15548997 : 5763719,
                        footer: { text: "Echo Lounge Feedback" }
                    }]
                })
            });
            showToast("Berhasil dikirim!");
            pesanEl.value = "";
            setTimeout(backMenu, 1500);
        } catch {
            showToast("Gagal terhubung ke Webhook!", true);
        }
        btn.innerHTML = "Kirim Sekarang";
        btn.disabled = false;
    }
</script>

</body>
</html>
